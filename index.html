<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Warm up TLS connections to the third-party hosts we hit on first paint,
         so fonts and images don't pay the DNS/handshake cost on demand. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- Load fonts NON-render-blocking. A plain <link rel="stylesheet"> to a
         third-party host blocks the FIRST paint of the whole document (even the
         inline splash below) until Google responds — so on a slow or throttled
         connection the visitor sees a blank white screen and thinks the site
         "won't start". Loading it as media="print" then swapping to "all" onload
         lets the page paint immediately; the fonts swap in when they arrive. The
         <noscript> keeps fonts working when JS is disabled. -->
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Poppins:wght@300;400;600;700&display=swap"
      media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Poppins:wght@300;400;600;700&display=swap" />
    </noscript>

    <!-- Preload the homepage hero (local optimized WebP) so it starts
         downloading before the JS bundle -->
    <link rel="preload" as="image" type="image/webp" fetchpriority="high"
      href="/images/hero.webp" />
    <title>Terra Estates - Luxury Real Estate</title>

    <!-- Instant splash screen: inline so it paints before the JS bundle loads.
         A gold house emblem draws itself, then the TERRA wordmark fades up
         beneath it. Removed by src/main.jsx once React mounts. -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.4rem;
        background: radial-gradient(130% 130% at 50% 35%, #1c1c1c 0%, #0e0e0e 55%, #060606 100%);
        opacity: 1;
        transition: opacity 0.6s ease;
      }
      #app-splash.is-hiding { opacity: 0; pointer-events: none; }

      .emblem {
        width: clamp(120px, 34vw, 170px);
        height: clamp(120px, 34vw, 170px);
        overflow: visible;
        filter: drop-shadow(0 0 10px rgba(192, 160, 103, 0.35));
        animation: emblem-float 3.6s ease-in-out 1.6s infinite;
      }
      .emblem [pathLength] {
        fill: none;
        stroke: #C0A067;
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 1;
        stroke-dashoffset: 1;
        animation: emblem-draw 1s ease forwards;
      }
      .emblem .ring  { stroke-width: 1.6; animation-duration: 1.1s; animation-delay: 0s; }
      .emblem .roof  { animation-delay: 0.55s; }
      .emblem .body  { animation-delay: 0.85s; }
      .emblem .door  { animation-delay: 1.15s; }
      /* Soft fill glows in once the outline is drawn */
      .emblem .house-fill {
        fill: rgba(192, 160, 103, 0.10);
        stroke: none;
        opacity: 0;
        animation: emblem-fill 0.9s ease 1.35s forwards;
      }

      /* TERRA wordmark — fades up once the house has finished drawing */
      .brandword {
        font-family: "Playfair Display", Georgia, serif;
        font-weight: 700;
        font-size: clamp(1.7rem, 6.5vw, 2.6rem);
        letter-spacing: 0.36em;
        text-indent: 0.36em;
        line-height: 1;
        background: linear-gradient(100deg, #8a6d34 0%, #f0dba6 45%, #C0A067 55%, #8a6d34 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        opacity: 0;
        animation:
          word-in 0.7s ease 1.6s forwards,
          word-shimmer 3s linear 2.3s infinite;
      }

      @keyframes emblem-draw  { to { stroke-dashoffset: 0; } }
      @keyframes emblem-fill  { to { opacity: 1; } }
      @keyframes emblem-float {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-12px); }
      }
      @keyframes word-in {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes word-shimmer { to { background-position: 200% center; } }
      @media (prefers-reduced-motion: reduce) {
        .emblem { animation: none; }
        .emblem [pathLength] { stroke-dashoffset: 0; animation: none; }
        .emblem .house-fill { opacity: 1; animation: none; }
        .brandword { opacity: 1; animation: none; }
      }
    </style>
    <meta name="description" content="Terra Estates curates the world's most prestigious properties — luxury homes, villas and penthouses in the finest locations." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Terra Estates" />
    <meta property="og:title" content="Terra Estates — Luxury Real Estate" />
    <meta property="og:description" content="Discover an exclusive collection of the world's most prestigious properties." />
    <meta property="og:image" content="https://terra-realestate.vercel.app/images/hero.webp" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Local business structured data. IMPORTANT: replace the domain, address,
         and areaServed below with your REAL business details for local SEO. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "RealEstateAgent",
        "name": "Terra Estates",
        "description": "Luxury real-estate agency curating the world's most prestigious properties.",
        "url": "https://terra-realestate.vercel.app",
        "logo": "https://terra-realestate.vercel.app/favicon.svg",
        "image": "https://terra-realestate.vercel.app/images/hero.webp",
        "telephone": "+383 48 77 33 88",
        "email": "info.terra@gmail.com",
        "priceRange": "$$$$",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "123 Luxury Ave",
          "addressLocality": "Prishtina",
          "postalCode": "10000",
          "addressCountry": "XK"
        },
        "openingHoursSpecification": [{
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
          "opens": "09:00",
          "closes": "19:00"
        }],
        "areaServed": ["Kosovo","United Arab Emirates","France","United States","United Kingdom"]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Terra Estates",
        "url": "https://terra-realestate.vercel.app"
      }
    </script>
  </head>
  <body>
    <div id="app-splash">
      <svg class="emblem" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="Terra Estates">
        <path class="house-fill" d="M28 50 L50 32 L72 50 L72 74 L28 74 Z" />
        <circle class="ring" cx="50" cy="50" r="42" pathLength="1" />
        <path class="roof" d="M26 52 L50 33 L74 52" pathLength="1" />
        <path class="body" d="M32 51 L32 74 L68 74 L68 51" pathLength="1" />
        <path class="door" d="M44 74 L44 61 L56 61 L56 74" pathLength="1" />
      </svg>
      <div class="brandword">TERRA</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Failsafe: if the app bundle fails to download (flaky mobile network),
         main.jsx never runs and the splash would otherwise spin forever. This
         inline script lives in the HTML itself, so it works even when the module
         never loads: if React hasn't mounted after 12s, show a friendly retry
         prompt instead of leaving the visitor on a dead loading screen. -->
    <script>
      (function () {
        setTimeout(function () {
          var root = document.getElementById('root');
          var splash = document.getElementById('app-splash');
          if (!splash || (root && root.childElementCount > 0)) return;
          splash.innerHTML =
            '<div style="color:#C0A067;font-family:Georgia,serif;text-align:center;padding:2rem;max-width:22rem">' +
            '<p style="font-size:1.15rem;margin-bottom:1.25rem;letter-spacing:.02em">Having trouble loading Terra Estates.</p>' +
            '<button onclick="location.reload()" style="background:#C0A067;color:#0e0e0e;border:0;border-radius:999px;padding:.7rem 1.6rem;font-size:1rem;font-weight:700;cursor:pointer">Reload</button>' +
            '<p style="opacity:.6;font-size:.8rem;margin-top:1rem">Check your internet connection and try again.</p>' +
            '</div>';
        }, 12000);
      })();
    </script>
  </body>
</html>

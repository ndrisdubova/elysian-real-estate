<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Warm up TLS connections to the third-party hosts we hit on first paint,
         so fonts and images don't pay the DNS/handshake cost on demand. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- Load fonts via a HEAD <link> (discovered immediately) instead of a CSS
         @import (discovered only after index.css downloads, then blocks render). -->
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=Poppins:wght@300;400;600;700&display=swap" />

    <!-- Preload the homepage hero (local optimized WebP) so it starts
         downloading before the JS bundle -->
    <link rel="preload" as="image" type="image/webp" fetchpriority="high"
      href="/images/hero.webp" />
    <title>Terra Estates - Luxury Real Estate</title>
    <meta name="description" content="Terra Estates curates the world's most prestigious properties — luxury homes, villas and penthouses in the finest locations." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Terra Estates" />
    <meta property="og:title" content="Terra Estates — Luxury Real Estate" />
    <meta property="og:description" content="Discover an exclusive collection of the world's most prestigious properties." />
    <meta property="og:image" content="https://raw.githubusercontent.com/farazc60/Project-Images/refs/heads/main/Elysian%20Real%20Estate%20Template/7.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Local business structured data. IMPORTANT: replace the domain, address,
         and areaServed below with your REAL business details for local SEO. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "RealEstateAgent",
        "name": "Terra Estates",
        "description": "Luxury real-estate agency curating the world's most prestigious properties.",
        "url": "https://terra-realestate.vercel.app",
        "logo": "https://terra-realestate.vercel.app/favicon.svg",
        "image": "https://raw.githubusercontent.com/farazc60/Project-Images/refs/heads/main/Elysian%20Real%20Estate%20Template/7.png",
        "telephone": "+383 48 77 33 88",
        "email": "info.terra@gmail.com",
        "priceRange": "$$$$",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "123 Luxury Ave",
          "addressLocality": "Prishtina",
          "postalCode": "10000",
          "addressCountry": "XK"
        },
        "openingHoursSpecification": [{
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
          "opens": "09:00",
          "closes": "19:00"
        }],
        "areaServed": ["Kosovo","United Arab Emirates","France","United States","United Kingdom"]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Terra Estates",
        "url": "https://terra-realestate.vercel.app"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
